<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Entre em Contato</title>
</head>
<body>

  <h1>Entre em Contato</h1>

  <form id="form">
    <input type="text" placeholder="Seu nome" id="nome"><br><br>
    <input type="email" placeholder="Seu email" id="email"><br><br>
    <textarea placeholder="Sua mensagem" id="mensagem"></textarea><br><br>
    <button type="submit">Enviar</button>
  </form>

  <p id="resposta"></p>

  <script src="./script.js"></script>
</body>
</html>
